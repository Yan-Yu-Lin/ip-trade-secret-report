<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>講稿 — 營業秘密 × 技術授權</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF8;
    --bg-card: #FFFFFF;
    --bg-slide-content: #F5F3EE;
    --bg-supplement: #F8F6F1;
    --border: #E8E4DD;

    --speaker-1-bg: #FDF5F0;
    --speaker-1-border: #E8C4B0;
    --speaker-2: #3D7C98;
    --speaker-2-bg: #F0F7FA;
    --speaker-2-border: #B0D4E4;
    --speaker-3: #6B7B3A;
    --speaker-3-bg: #F5F7EE;
    --speaker-3-border: #C4CDA0;
    --speaker-4: #8B5E83;
    --speaker-4-bg: #F9F3F8;
    --speaker-4-border: #D4B8CE;
    --speaker-5: #C17D2E;
    --speaker-5-bg: #FDF8F0;
    --speaker-5-border: #E4CCA8;
    --speaker-6: #4A7B6F;

    --shadow-lg: 0 8px 30px rgba(0,0,0,0.06), 0 4px 8px rgba(0,0,0,0.03);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; scroll-padding-top: 80px; }
  body {
    font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;

  .header-left { display: flex; align-items: center; gap: 14px; min-width: 0; }

  .version-btn {
    padding: 6px 16px; border-radius: 18px; border: none; background: transparent;
    font-family: 'Noto Sans TC', sans-serif; font-size: 13px; font-weight: 500;
    color: var(--text-tertiary); cursor: pointer; transition: all 0.25s ease; white-space: nowrap;
  }
  .version-btn.active { background: var(--bg-card); color: var(--text-primary); box-shadow: var(--shadow-sm); }
  .version-btn:hover:not(.active) { color: var(--text-secondary); }
  .slide-nav-bar { background: var(--bg-card); border-bottom: 1px solid var(--border-light); overflow: hidden; }
  .slide-nav-scroll {
    max-width: 840px; margin: 0 auto; padding: 0 24px;
    overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none;
  }
  .slide-nav-scroll::-webkit-scrollbar { display: none; }
  .slide-nav { display: flex; gap: 2px; padding: 8px 0; }
  .slide-nav-btn {
    flex-shrink: 0; width: 34px; height: 34px; border-radius: 8px;
    border: 1.5px solid var(--border); background: var(--bg);
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500;
    color: var(--text-tertiary); cursor: pointer; transition: all 0.2s ease;
    display: flex; align-items: center; justify-content: center;
  }
  .slide-nav-btn:hover { border-color: var(--text-tertiary); color: var(--text-secondary); }
  .slide-nav-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }
  .slide-nav-btn.speaker-1 { border-left: 3px solid var(--speaker-1); }
  .slide-nav-btn.speaker-2 { border-left: 3px solid var(--speaker-2); }
  .slide-nav-btn.speaker-3 { border-left: 3px solid var(--speaker-3); }
  .slide-nav-btn.speaker-4 { border-left: 3px solid var(--speaker-4); }
  .slide-nav-btn.speaker-5 { border-left: 3px solid var(--speaker-5); }
  .slide-nav-btn.speaker-6 { border-left: 3px solid var(--speaker-6); }
  .slide-nav-btn.active.speaker-1 { background: var(--speaker-1); border-color: var(--speaker-1); }
  .slide-nav-btn.active.speaker-2 { background: var(--speaker-2); border-color: var(--speaker-2); }
  .slide-nav-btn.active.speaker-3 { background: var(--speaker-3); border-color: var(--speaker-3); }
  .slide-nav-btn.active.speaker-4 { background: var(--speaker-4); border-color: var(--speaker-4); }
  .slide-nav-btn.active.speaker-5 { background: var(--speaker-5); border-color: var(--speaker-5); }
  .slide-nav-btn.active.speaker-6 { background: var(--speaker-6); border-color: var(--speaker-6); }
  .main-wrapper { max-width: 1120px; margin: 0 auto; display: flex; gap: 0; position: relative; }
  .toc-sidebar {
    position: sticky; top: 110px; align-self: flex-start;

    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .toc-sidebar::-webkit-scrollbar { width: 4px; }
  .toc-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .toc-title { font-size: 11px; font-weight: 600; color: var(--text-tertiary); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; padding-left: 10px; }
  #tocList { display: flex; flex-direction: column; gap: 2px; }
  .toc-item {
    display: flex; align-items: baseline; gap: 8px; padding: 6px 10px; border-radius: 6px;
    cursor: pointer; transition: all 0.15s ease; text-decoration: none; color: var(--text-secondary);
    font-size: 13px; line-height: 1.4; border-left: 2px solid transparent; margin-bottom: 1px;
  }
  .toc-item:hover { color: var(--text-primary); }
  .toc-item.active { color: #fff; font-weight: 600; border-left-color: currentColor; box-shadow: var(--shadow-sm); }
  .toc-item.speaker-1 { background: var(--speaker-1-bg); background: color-mix(in srgb, var(--speaker-1-bg) 72%, var(--speaker-1) 28%); border-left-color: var(--speaker-1); }
  .toc-item.speaker-2 { background: var(--speaker-2-bg); background: color-mix(in srgb, var(--speaker-2-bg) 72%, var(--speaker-2) 28%); border-left-color: var(--speaker-2); }
  .toc-item.speaker-3 { background: var(--speaker-3-bg); background: color-mix(in srgb, var(--speaker-3-bg) 72%, var(--speaker-3) 28%); border-left-color: var(--speaker-3); }
  .toc-item.speaker-4 { background: var(--speaker-4-bg); background: color-mix(in srgb, var(--speaker-4-bg) 72%, var(--speaker-4) 28%); border-left-color: var(--speaker-4); }
  .toc-item.speaker-5 { background: var(--speaker-5-bg); background: color-mix(in srgb, var(--speaker-5-bg) 72%, var(--speaker-5) 28%); border-left-color: var(--speaker-5); }
  .toc-item.speaker-6 { background: var(--speaker-6-bg); background: color-mix(in srgb, var(--speaker-6-bg) 72%, var(--speaker-6) 28%); border-left-color: var(--speaker-6); }
  .toc-item.speaker-1 .toc-num { color: var(--speaker-1); }
  .toc-item.speaker-2 .toc-num { color: var(--speaker-2); }
  .toc-item.speaker-3 .toc-num { color: var(--speaker-3); }
  .toc-item.speaker-4 .toc-num { color: var(--speaker-4); }
  .toc-item.speaker-5 .toc-num { color: var(--speaker-5); }
  .toc-item.speaker-6 .toc-num { color: var(--speaker-6); }
  .toc-item.active.speaker-1 { background: var(--speaker-1); border-left-color: var(--speaker-1); }
  .toc-item.active.speaker-2 { background: var(--speaker-2); border-left-color: var(--speaker-2); }
  .toc-item.active.speaker-3 { background: var(--speaker-3); border-left-color: var(--speaker-3); }
  .toc-item.active.speaker-4 { background: var(--speaker-4); border-left-color: var(--speaker-4); }
  .toc-item.active.speaker-5 { background: var(--speaker-5); border-left-color: var(--speaker-5); }
  .toc-item.active.speaker-6 { background: var(--speaker-6); border-left-color: var(--speaker-6); }
  .toc-item.active .toc-num { color: rgba(255,255,255,0.78); }
  .toc-item.active .toc-label { color: #fff; }
  .toc-item .toc-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-label); flex-shrink: 0; width: 20px; }
  .toc-item .toc-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .main-content { flex: 1; min-width: 0; max-width: 840px; padding: 32px 24px 120px; }
  .intro-banner {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 32px; margin-bottom: 40px; box-shadow: var(--shadow-sm);
  }
  .intro-banner h1 {
    font-family: 'Noto Serif TC', serif; font-weight: 900; font-size: 28px;
    letter-spacing: 0.04em; margin-bottom: 8px; color: var(--text-primary);
  }
  .intro-banner p { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }
  .intro-banner .note {
    margin-top: 16px; padding: 12px 16px; background: var(--bg-slide-content);
    border-radius: var(--radius); font-size: 13px; color: var(--text-tertiary);
    line-height: 1.7; border-left: 3px solid var(--border);
  }
  .speaker-legend { display: flex; flex-wrap: wrap; gap: 8px 16px; margin-top: 20px; }
  .speaker-legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
  .speaker-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .slide-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
    margin-bottom: 24px; overflow: hidden; box-shadow: var(--shadow-sm);
    transition: box-shadow 0.3s ease; animation: slideIn 0.4s ease both;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .slide-card:hover { box-shadow: var(--shadow-md); }
  .slide-card-header {
    padding: 20px 28px; display: flex; align-items: flex-start;
    justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--border-light);
  }
  .slide-card-header-left { display: flex; align-items: flex-start; gap: 14px; min-width: 0; }
  .slide-number {
    font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; color: #fff;
    background: var(--accent); width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;
  }
  .slide-meta { min-width: 0; }
  .slide-title {
    font-family: 'Noto Serif TC', serif; font-weight: 600; font-size: 18px;
    line-height: 1.5; color: var(--text-primary); margin-bottom: 4px;
  }
  .slide-info { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .speaker-badge {
    display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px;
    border-radius: 12px; font-size: 12px; font-weight: 500; white-space: nowrap;
  }
  .time-badge { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-tertiary); white-space: nowrap; }
  .speaker-1 .slide-number { background: var(--speaker-1); }
  .speaker-1 .speaker-badge { background: var(--speaker-1-bg); color: var(--speaker-1); border: 1px solid var(--speaker-1-border); }
  .speaker-2 .slide-number { background: var(--speaker-2); }
  .speaker-2 .speaker-badge { background: var(--speaker-2-bg); color: var(--speaker-2); border: 1px solid var(--speaker-2-border); }
  .speaker-3 .slide-number { background: var(--speaker-3); }
  .speaker-3 .speaker-badge { background: var(--speaker-3-bg); color: var(--speaker-3); border: 1px solid var(--speaker-3-border); }
  .speaker-4 .slide-number { background: var(--speaker-4); }
  .speaker-4 .speaker-badge { background: var(--speaker-4-bg); color: var(--speaker-4); border: 1px solid var(--speaker-4-border); }
  .speaker-5 .slide-number { background: var(--speaker-5); }
  .speaker-5 .speaker-badge { background: var(--speaker-5-bg); color: var(--speaker-5); border: 1px solid var(--speaker-5-border); }
  .speaker-6 .slide-number { background: var(--speaker-6); }
  .speaker-6 .speaker-badge { background: var(--speaker-6-bg); color: var(--speaker-6); border: 1px solid var(--speaker-6-border); }
  .slide-card-body { padding: 24px 28px; }
  .on-slide {
    background: var(--bg-slide-content); border: 1px solid var(--border-light);
    border-radius: var(--radius); padding: 14px 18px; margin-bottom: 20px;
  }
  .section-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-label); margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
  }
  .section-label .icon { font-size: 13px; opacity: 0.6; }
  .on-slide-text { font-size: 14px; color: var(--text-secondary); line-height: 1.8; }
  .speech-section { margin-bottom: 20px; }
  .speech-text {
    font-family: 'Noto Serif TC', serif; font-size: 16.5px; line-height: 2;
    color: var(--text-primary); font-weight: 400;
  }
  .speech-text p { margin-bottom: 14px; }
  .speech-text p:last-child { margin-bottom: 0; }
  .speech-text strong {
    font-weight: 600; color: var(--text-primary);
    background: linear-gradient(to bottom, transparent 60%, rgba(200, 180, 130, 0.18) 60%);
    padding: 0 1px;
  }
  .supplement-section { border-top: 1px solid var(--border-light); padding-top: 16px; margin-top: 4px; }
  .supplement-toggle {
    display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px 14px;
    background: var(--bg-supplement); border: 1px solid var(--border-light); border-radius: var(--radius);
    font-size: 13px; font-weight: 500; color: var(--text-tertiary); transition: all 0.2s ease;
    width: 100%; text-align: left;
  }
  .supplement-toggle:hover { color: var(--text-secondary); border-color: var(--border); }
  .supplement-toggle .chevron { transition: transform 0.25s ease; font-size: 11px; flex-shrink: 0; }
  .supplement-toggle.open .chevron { transform: rotate(90deg); }
  .supplement-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.3s ease; }
  .supplement-content.open { max-height: 2000px; padding-top: 12px; }
  .supplement-content ul { list-style: none; padding: 0; }
  .supplement-content li {
    position: relative; padding-left: 18px; margin-bottom: 8px;
    font-size: 13.5px; color: var(--text-tertiary); line-height: 1.8;
  }
  .supplement-content li::before {
    content: ''; position: absolute; left: 0; top: 11px;
    width: 6px; height: 6px; border-radius: 50%; background: var(--border);
  }
  .back-to-top {
    position: fixed; bottom: 28px; right: 28px; width: 44px; height: 44px;
    border-radius: 50%; border: 1px solid var(--border);
    background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px); box-shadow: var(--shadow-md);

  .back-to-top:hover { box-shadow: var(--shadow-lg); border-color: var(--text-tertiary); }
  .back-to-top svg { width: 18px; height: 18px; color: var(--text-secondary); }
  .mobile-menu-button, .mobile-menu-popover { display: none; }
  .site-footer { text-align: center; padding: 24px; font-size: 12px; color: var(--text-tertiary); border-top: 1px solid var(--border-light); }
  @media (max-width: 960px) {

    .main-wrapper { max-width: 840px; }
  }
  @media (max-width: 640px) {
    .site-header, .slide-nav-bar { display: none; }
    .header-inner { flex-direction: column; align-items: stretch; gap: 10px; padding: 12px 16px; }
    .header-left { justify-content: space-between; }
    .header-subtitle { display: none; }
    .version-toggle { align-self: stretch; }
    .version-btn { flex: 1; text-align: center; }
    .slide-nav-scroll { padding: 0 16px; }
    .mobile-menu-button {
      position: fixed; right: 16px; top: 16px; z-index: 120;
      width: 42px; height: 42px; border-radius: 50%;
      border: 1px solid var(--border); background: rgba(255,255,255,0.92);
      color: var(--text-primary); box-shadow: var(--shadow-md);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Noto Sans TC', sans-serif; font-size: 18px; font-weight: 700;
      cursor: pointer;
    }
    .mobile-menu-popover.open { display: block; }
    .mobile-menu-popover {
      position: fixed; right: 12px; top: 66px; z-index: 119;

      overflow-y: auto; overscroll-behavior: contain;
      background: rgba(255,255,255,0.96); border: 1px solid var(--border);
      border-radius: 14px; box-shadow: var(--shadow-lg);

    .main-wrapper { max-width: none; width: 100%; }
    .main-content { width: 100%; max-width: none; padding: 16px 12px 96px; }
    .intro-banner { padding: 20px 14px; margin-bottom: 12px; border-radius: 0; border-left: 0; border-right: 0; box-shadow: none; }
    .intro-banner h1 { font-size: 22px; }
    .slide-card {
      background: transparent; border: 0; border-top: 1px solid var(--border);
      border-radius: 0; box-shadow: none; margin: 0; overflow: visible;
    }
    .slide-card:hover { box-shadow: none; }
    .slide-card-header {
      padding: 14px 2px 10px; flex-direction: row; align-items: flex-start;
      gap: 10px; border-bottom: 0;
    }
    .slide-card-header-left { gap: 10px; }
    .slide-number { width: 30px; height: 30px; border-radius: 6px; font-size: 12px; margin-top: 1px; }
    .slide-title { font-size: 17px; line-height: 1.4; margin-bottom: 5px; }
    .slide-info { gap: 6px; }
    .speaker-badge { padding: 2px 8px; font-size: 11px; border-radius: 10px; }
    .time-badge { font-size: 11px; }
    .slide-card-body { padding: 0 2px 24px; }
    .on-slide {
      background: transparent; border: 0; border-left: 3px solid var(--border);
      border-radius: 0; padding: 8px 0 8px 12px; margin-bottom: 18px;
    }
    .on-slide-text { font-size: 14.5px; line-height: 1.8; }
    .speech-section { margin-bottom: 18px; }
    .speech-text { font-size: 16px; line-height: 1.95; }
    .supplement-section { margin-top: 0; padding-top: 12px; border-top: 1px solid var(--border-light); }

  @media print {
    .site-header, .slide-nav-bar, .version-toggle, .back-to-top { display: none; }

    .slide-card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; }
    .supplement-content { max-height: none !important; padding-top: 12px !important; }
  }
</style>
</head>
<body>
<header class="site-header" id="siteHeader">
  <div class="header-inner">
    <div class="header-left">
      <span class="header-title">講稿</span>
      <span class="header-subtitle">營業秘密 &times; 技術授權 &mdash; 24 頁</span>
    </div>

    "speech": "<p>那具體來說，什麼時候該選專利、什麼時候該選營業秘密？這裡有一個決策矩陣，用四個因素來判斷。核心問題是：<strong>如果這個技術被公開了，會怎樣？</strong></p>\n<p>第一個因素：<strong>逆向工程的難度。</strong> 你的產品賣出去以後，別人能不能拆開來搞清楚怎麼做的？如果可以 — 像硬體結構、電路板設計 — 那保密沒用，產品一上市就不是秘密了，不如申請專利至少有 20 年保護。但如果技術藏在工廠的製程裡面，外部根本看不到 — 像台積電的製程參數 — 那保密就非常有效。</p>\n<p>第二個因素：<strong>技術的生命週期。</strong> 這個技術在 20 年內就會被新技術淘汰嗎？那專利的 20 年保護期夠用了。但如果技術的價值可能超過 20 年呢？可口可樂的配方就是最極端的例子 — 從 1886 年至今 130 多年，如果當初申請了專利，配方早在 1906 年就公開了。</p>\n<p>第三個因素：<strong>侵權偵測。</strong> 你能不能從市場上的產品直接看出有人侵權？如果可以，專利比較好 — 因為你有明確的比對基礎。但如果濫用發生在競爭對手的工廠裡面，你根本不知道對方在用你的技術，那即使有專利也很難舉證，反而用營業秘密搭配內部控制更實際。</p>\n<p>第四個因素：<strong>獨立發明的風險。</strong> 如果這個技術很有可能別人自己也會想到，那趕快申請專利卡位。但如果這個技術需要大量的試錯、大量的經驗累積才可能知道 — 像半導體的良率調校 — 那保密就好，因為對手很難自己做到。</p>\n<p>最聰明的公司其實不是二選一，而是<strong>兩個都用</strong>。用專利保護別人能觀察到的架構層，用營業秘密保護別人看不到的執行層。台積電就是這樣做的 — 11.4 萬件專利守住架構，47.5 萬筆營業秘密守住製程。</p>",

    "speech": "<p>搭配分級揭露，付款結構也是分層設計的，每一種付款對應不同的風險分配。</p>\n<p><strong>前期授權金</strong>是「入場費」— 對方付了這筆錢才能取得機密資料包，同時也幫授權方回收一部分研發成本。</p>\n<p><strong>里程碑付款</strong>是「驗收後才付的錢」— 對方每通過一個階段的驗收，才進入下一階段的付款和揭露。這保護了授權方：如果對方做不出來，你不需要繼續交出更深層的 know-how。</p>\n<p><strong>按量或按營收抽成</strong>是長期的利潤分享 — 對方每出一台產品、每賣一台設備，你都抽一筆。這是持續性的現金流。</p>\n<p><strong>最低授權金</strong>很重要但常被忽略 — 它防止對方拿到技術後擱置不用。如果對方拿了你的 know-how 但不量產、不出貨，你靠抽成什麼都拿不到。最低授權金確保不管對方用不用，每年至少要付一個底線金額。</p>\n<p><strong>技術支援費</strong>是工程師培訓、現場調試、問題排除的費用。know-how 不是給了文件就能用 — 很多時候需要授權方的工程師實際到場協助。</p>\n<p>最後是<strong>稽核權</strong> — 授權方有權檢查對方的帳簿，確認出貨量和銷售額有沒有少報。這不只是法律條款，它是營收保護機制。等一下講 Dolby 的時候會看到稽核有多重要。</p>",

    "speech": "<p>老師要求我們用 BMC — Business Model Canvas，商業模式圖 — 來分析營業秘密的角色。BMC 是一個九宮格的分析框架，用來描述一家公司怎麼創造、傳遞和獲取價值。</p>\n<p>很多人直覺會把營業秘密放在「關鍵資源」那一格。但其實它滲透了整個九宮格。</p>\n<p>它是<strong>關鍵資源</strong>（製程配方、良率數據）。它決定了<strong>價值主張</strong>（更快投產、更高良率、更低失敗風險）。它產生了<strong>收入來源</strong>（授權金、技術支援費、認證費）。它定義了<strong>關鍵活動</strong>（保護、改良、培訓、稽核）。它塑造了<strong>客戶關係</strong>（長期技術支援、改進共享）。它也影響了<strong>成本結構</strong>（安全、法律、監控、訴訟準備）。</p>\n<p>跟專利型 BMC 最大的差異在於：<strong>專利說的是「沒有我的許可你不能合法做這件事」— 變現的是排除權。營業秘密說的是「你可以試，但我能讓你做得更快、更便宜、更少損失」— 變現的是執行優勢。</strong></p>",

    "speech": "<p>前面講收入結構的時候提到「稽核權」。Dolby 把稽核做到了極致 — 它不只是一個合約條款，而是一個持續運作的營收保護機制。</p>\n<p>運作方式是這樣的。第一步，晶片供應商每季要回報：出了多少 Dolby 晶片給哪些公司。第二步，系統授權方每季也要回報：出了多少台含 Dolby 技術的設備。</p>\n<p>第三步是關鍵：<strong>Dolby 把這兩組數據交叉比對。</strong> 如果晶片商說出了 100 萬顆 Dolby 晶片給 A 公司，但 A 公司只報賣了 80 萬台設備 — 那 20 萬的差距去哪了？Dolby 會發動調查。</p>\n<p>第四步：如果稽核發現少報的金額<strong>超過應付金額的 5%</strong>，就構成重大違約。後果很嚴重：被授權方要賠<strong>三倍</strong>未付授權金，加上月利率 1.5% 的利息，加上 Dolby 的稽核和法律費用全額。</p>\n<p>更狠的是：如果是<strong>蓄意少報</strong>，Dolby 可以直接通知晶片供應商，告訴他們這家公司<strong>不再具備良好資格</strong> — 直接斷供 Dolby 晶片。等於直接切斷對方的產品線。</p>\n<p>這不是理論上的威脅。2024 年 Roku 就因為拒絕讓 Dolby 行使合約裡的稽核權，被 Dolby 告上美國加州聯邦法院。Dolby 甚至在德國拿到了初步禁制令。</p>\n<p>所以稽核不是「以防萬一」的防禦措施 — <strong>它是授權商業模式的營收保護機制</strong>，是確保整個收費體系能運轉的關鍵環節。</p>",

    "speech": "<p>三個案例都指向同一件事：<strong>營業秘密的價值取決於你怎麼保護它。</strong></p>\n<p>而且要記得我們在第三張投影片講的第三個法律要件 — 「合理保密措施」。如果你不能證明有在認真保護，法律上你的秘密<strong>可能根本不算營業秘密</strong>。你去告對方偷你的東西，法院會先問：你自己有在保護嗎？</p>\n<p>所以內控不只是「防禦措施」— 不是為了防止壞事發生才做的。<strong>它是你能主張營業秘密權利的基礎建設。</strong> 沒有它，你連告人的資格都可能沒有。</p>\n<p>六個層面。</p>\n<p><strong>法律層</strong>：NDA（保密協議）、發明歸屬條款（員工的發明歸公司所有）、保密存續條款（離職後保密義務持續）、授權合約裡的稽核權。</p>\n<p><strong>員工層</strong>：角色式存取控制（不是每個人都能看到所有東西）、培訓紀錄（確保員工知道什麼是機密、怎麼處理）、離職面談和歸還/刪除認證。</p>\n<p><strong>技術層</strong>：Need-to-know 權限設計、DLP 系統（Data Loss Prevention，偵測和阻擋異常的資料外洩）、文件浮水印、存取日誌記錄、禁止大量匯出。</p>\n<p><strong>組織層</strong>：營業秘密登錄冊（公司知道自己有哪些秘密）、揭露審批流程（要分享給外部之前要經過批准）、供應商管控。</p>\n<p><strong>證據層</strong>：不可竄改的日誌、版本控管、存取歷史紀錄、簽署的交接文件。</p>\n<p>最後是<strong>實體和供應鏈層</strong>：無手機區（防拍照）、遠端工作的安全規則、供應商現場稽核。</p>\n<p>回頭看案例。<strong>台積電 vs TEL 案</strong>告訴我們：DLP 擋得住數位外洩（下載、轉寄、列印），但擋不住有人拿手機對著螢幕拍照。遠端工作讓機密離開了無手機區的保護。2026 年一審判決：主犯 10 年，TEL 台灣罰金 1.5 億新台幣。台灣檢方是依國家安全法加營業秘密法起訴 — 因為先進半導體製程被列為國家核心關鍵技術。</p>\n<p><strong>Waymo 案</strong>告訴我們：日誌有在記錄，但沒有即時警報。9.7 GB 的大量下載整整一年後才因為一封意外的 CC 郵件被發現。保護必須是全方位的 — 有記錄不等於有保護。</p>",

    "speech": "<p>最後做個總結。三個案例，三種模式，一個道理。</p>\n<p><strong>Dolby</strong> 把 know-how、專利、軟體、品牌和認證打包成授權組合，建立了一個自我強化的生態系。每年收 12.5 億美元授權金，92.5% 的營收來自授權，全公司只有 2,200 人。</p>\n<p><strong>台積電</strong> 選擇不授權 — 把 know-how 留在自己手裡，賣的是「我幫你做」的服務。靠十幾年累積的製程 know-how 和 47.5 萬筆營業秘密，撐起年營收 900 億美元的晶圓代工帝國。</p>\n<p><strong>Waymo/Uber</strong> 是反面教材。Waymo 的 LiDAR know-how 被偷走，和解 2.45 億美元。Uber 最終放棄自駕，前後損失 30 億美元。聯邦檢察官說：「偷竊不是創新。」</p>\n<p><strong>秘密不只是資訊。它是一家公司花了大量時間和失敗累積出來的執行能力 — 是可控的重複性。</strong></p>\n<p>控制好了，它就是源源不絕的現金流。控制不好，價值可能一夕崩塌。</p>\n<p>以上是我們第六組的報告，謝謝大家。</p>",

let currentVersion = 'detailed';
let activeSlideInView = 1;
let slideObserver = null;

function getCurrentSlides() {
  return currentVersion === 'detailed' ? detailedSlides : shortSlides;
}

function scrollToSlide(slideNum, behavior = 'smooth') {
  const el = document.getElementById('slide-' + slideNum);
  if (!el) return;
  const topOffset = window.innerWidth <= 640 ? 12 : 104;
  const targetTop = el.getBoundingClientRect().top + window.pageYOffset - topOffset;
  if (behavior === 'instant') {
    const root = document.documentElement;
    const previousScrollBehavior = root.style.scrollBehavior;
    root.style.scrollBehavior = 'auto';
    window.scrollTo({ top: Math.max(0, targetTop), behavior: 'auto' });
    root.style.scrollBehavior = previousScrollBehavior;
    return;
  }
  window.scrollTo({ top: Math.max(0, targetTop), behavior });
}

function getSpeaker(slideNum) {
  const ranges = {1:[1,2,3,4], 2:[5,6,7,8,9,10], 3:[11,12,13,14], 4:[15,16,17,18], 5:[19,20,21,22], 6:[23,24]};
  for (const [speaker, slides] of Object.entries(ranges)) {
    if (slides.includes(slideNum)) return parseInt(speaker);
  }
  return 1;
}

function buildSlideNav() {
  const nav = document.getElementById('slideNav');
  nav.innerHTML = '';
  for (let i = 1; i <= 24; i++) {
    const btn = document.createElement('button');
    btn.className = 'slide-nav-btn speaker-' + getSpeaker(i);
    btn.textContent = i;
    btn.dataset.slide = i;
    if (i === 1) btn.classList.add('active');
    btn.addEventListener('click', () => {
      scrollToSlide(i);
    });
    nav.appendChild(btn);
  }
}

function updateSlideNavActive(num) {
  document.querySelectorAll('.slide-nav-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.slide) === num);
  });
}

function toggleMobileMenu(forceOpen) {
  const popover = document.getElementById('mobileMenuPopover');
  const button = document.getElementById('mobileMenuButton');
  if (!popover || !button) return;
  const open = typeof forceOpen === 'boolean' ? forceOpen : !popover.classList.contains('open');
  popover.classList.toggle('open', open);
  popover.setAttribute('aria-hidden', open ? 'false' : 'true');
  button.setAttribute('aria-expanded', open ? 'true' : 'false');
}

function renderSlides() {
  const container = document.getElementById('slidesContainer');
  const slides = getCurrentSlides();
  container.innerHTML = '';
  slides.forEach((slide, idx) => {
    const card = document.createElement('div');
    card.className = 'slide-card speaker-' + slide.speaker;
    card.id = 'slide-' + slide.num;
    card.style.animationDelay = Math.min(idx * 0.03, 0.3) + 's';
    let supplementHTML = '';
    if (slide.supplement && slide.supplement.length > 0) {
      const items = slide.supplement.map(s => '<li>' + s + '</li>').join('');
      supplementHTML = '<div class="supplement-section">' +
        '<button class="supplement-toggle" onclick="toggleSupplement(this)">' +
        '<span class="chevron">&#9654;</span>' +
        '<span>補充背景（講者參考）</span>' +
        '</button>' +
        '<div class="supplement-content"><ul>' + items + '</ul></div></div>';
    }
    card.innerHTML =
      '<div class="slide-card-header">' +
        '<div class="slide-card-header-left">' +
          '<div class="slide-number">' + slide.num + '</div>' +
          '<div class="slide-meta">' +
            '<div class="slide-title">' + slide.title + '</div>' +
            '<div class="slide-info">' +
              '<span class="speaker-badge">Speaker ' + slide.speaker + '</span>' +
              '<span class="time-badge">' + slide.time + '</span>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="slide-card-body">' +
        '<div class="on-slide">' +
          '<div class="section-label"><span class="icon">&#9654;</span> 投影片上寫的</div>' +
          '<div class="on-slide-text">' + slide.onSlide + '</div>' +
        '</div>' +
        '<div class="speech-section">' +
          '<div class="section-label" style="margin-bottom:10px"><span class="icon">&#127908;</span> 要講的</div>' +
          '<div class="speech-text">' + slide.speech + '</div>' +
        '</div>' +
        supplementHTML +
      '</div>';
    container.appendChild(card);
  });
}

function toggleSupplement(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}

function switchVersion(version) {
  if (version === currentVersion) return;
  const targetSlide = activeSlideInView || 1;
  currentVersion = version;
  activeSlideInView = targetSlide;
  document.querySelectorAll('.version-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.version === version);
  });
  const note = document.getElementById('introBannerNote');
  if (version === 'detailed') {
    note.innerHTML = '每頁標註講者建議、預估時間、投影片內容摘要、要講的內容、以及補充細節。<br>講者可以用自己的話講，不需要逐字唸。補充細節是給講者自己理解用的背景知識，不一定要全部講出來。';
  } else {
    note.innerHTML = '每頁標註講者建議、預估時間、要講的內容。講者可以用自己的話講，這裡是參考底稿。';
  }
  renderSlides();
  buildToc();
  updateSlideNavActive(targetSlide);
  observeSlideCards();
  scrollToSlide(targetSlide, 'instant');
}

function buildToc() {
  const tocList = document.getElementById('tocList');
  const mobileTocList = document.getElementById('mobileTocList');
  tocList.innerHTML = '';
  if (mobileTocList) mobileTocList.innerHTML = '';
  const slides = getCurrentSlides();
  slides.forEach(s => {
    tocList.appendChild(createTocItem(s, false));
    if (mobileTocList) mobileTocList.appendChild(createTocItem(s, true));
  });
  updateTocActive(activeSlideInView);
}

function createTocItem(slide, closeOnClick) {
  const item = document.createElement('a');
  item.className = 'toc-item speaker-' + (slide.speaker || getSpeaker(slide.num));
  item.href = '#slide-' + slide.num;
  item.dataset.slide = slide.num;
  item.innerHTML = '<span class="toc-num">' + slide.num + '</span><span class="toc-label">' + slide.title + '</span>';
  item.addEventListener('click', (e) => {
    e.preventDefault();
    scrollToSlide(slide.num);
    if (closeOnClick) toggleMobileMenu(false);
  });
  return item;
}

function updateTocActive(num) {
  document.querySelectorAll('.toc-item').forEach(item => {
    item.classList.toggle('active', parseInt(item.dataset.slide) === num);
  });
  const activeItem = document.querySelector('#tocList .toc-item.active');
  const sidebar = document.getElementById('tocSidebar');
  if (activeItem && sidebar && sidebar.clientHeight > 0) {
    const itemRect = activeItem.getBoundingClientRect();
    const sidebarRect = sidebar.getBoundingClientRect();
    const isAbove = itemRect.top < sidebarRect.top;
    const isBelow = itemRect.bottom > sidebarRect.bottom;
    if (isAbove || isBelow) {
      const targetTop = sidebar.scrollTop + (itemRect.top - sidebarRect.top) - (sidebar.clientHeight / 2) + (itemRect.height / 2);
      sidebar.scrollTo({ top: Math.max(0, targetTop), behavior: 'smooth' });
    }
  }
}

function setupScrollObservers() {
  const header = document.getElementById('siteHeader');
  window.addEventListener('scroll', () => {
    header.classList.toggle('scrolled', window.scrollY > 10);
  }, { passive: true });
  const btt = document.getElementById('backToTop');
  window.addEventListener('scroll', () => {
    btt.classList.toggle('visible', window.scrollY > 400);
  }, { passive: true });
  observeSlideCards();
}

function observeSlideCards() {
  if (slideObserver) slideObserver.disconnect();
  slideObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const num = parseInt(entry.target.id.replace('slide-', ''));
        activeSlideInView = num;
        updateSlideNavActive(num);
        updateTocActive(num);
        const activeBtn = document.querySelector('.slide-nav-btn[data-slide="' + num + '"]');
        if (activeBtn) {
          const scroll = document.getElementById('slideNavScroll');
          const btnRect = activeBtn.getBoundingClientRect();
          const scrollRect = scroll.getBoundingClientRect();
          if (btnRect.left < scrollRect.left || btnRect.right > scrollRect.right) {
            const offset = activeBtn.offsetLeft - scroll.offsetWidth / 2 + activeBtn.offsetWidth / 2;
            scroll.scrollTo({ left: offset, behavior: 'smooth' });
          }
        }
      }
    });
  }, { rootMargin: '-100px 0px -60% 0px', threshold: 0 });
  document.querySelectorAll('.slide-card').forEach(card => slideObserver.observe(card));
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') toggleMobileMenu(false);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    const prev = Math.max(1, activeSlideInView - 1);
    scrollToSlide(prev);
  } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    const next = Math.min(24, activeSlideInView + 1);
    scrollToSlide(next);
  }
});

document.addEventListener('click', (e) => {
  const popover = document.getElementById('mobileMenuPopover');
  const button = document.getElementById('mobileMenuButton');
  if (!popover || !button || !popover.classList.contains('open')) return;
  if (popover.contains(e.target) || button.contains(e.target)) return;
  toggleMobileMenu(false);
});

buildSlideNav();
renderSlides();
buildToc();
setupScrollObservers();

</script>
